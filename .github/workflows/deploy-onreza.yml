name: Deploy to ONREZA

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: onreza-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger ONREZA deploy hook
        env:
          ONREZA_DEPLOY_HOOK_URL: ${{ secrets.ONREZA_DEPLOY_HOOK_URL }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if [ -z "$ONREZA_DEPLOY_HOOK_URL" ]; then
            echo "Missing ONREZA_DEPLOY_HOOK_URL secret"
            exit 1
          fi

          MESSAGE=${COMMIT_MESSAGE:-Manual deploy trigger}

          curl --fail-with-body \
            --request POST \
            --header "Content-Type: application/json" \
            --data "$(jq -cn \
              --arg commitSha "$COMMIT_SHA" \
              --arg branch "$BRANCH_NAME" \
              --arg message "$MESSAGE" \
              '{commitSha: $commitSha, branch: $branch, message: $message}')" \
            "$ONREZA_DEPLOY_HOOK_URL"
